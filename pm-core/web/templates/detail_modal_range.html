<!-- Custom range modal -->
<div id="rangeModal" class="modal-backdrop">
  <div class="modal">
    <h3>Select Time Range</h3>
    <div class="modal-row">
      <label for="rangeStart">Start</label>
      <input type="datetime-local" id="rangeStart">
    </div>
    <div class="modal-row">
      <label for="rangeEnd">End</label>
      <input type="datetime-local" id="rangeEnd">
    </div>
    <div class="modal-actions">
      <button type="button" class="btn-sm" id="btnRangeCancel">Cancel</button>
      <button type="button" class="btn-sm primary" id="btnRangeApply">Apply</button>
    </div>
  </div>
</div>
