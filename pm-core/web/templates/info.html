<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <title>PM-Core Info</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-5">
  <h1 class="fw-bold mb-4">PM-Core Info</h1>

  {% if notice %}
    <div class="alert alert-warning">{{ notice }}</div>
  {% endif %}

  <div class="card shadow-sm">
    <div class="card-body">
      <div class="row">
        <div class="col-12 col-md-6 mb-3">
          <div class="text-muted">Total hosts:</div>
          <div class="fs-3">{{ total or 0 }}</div>
        </div>
        <div class="col-12 col-md-6 mb-3">
          <div class="text-muted">Last ingest (TH):</div>
          <div class="fs-5">{{ last_ingest_th or '-' }}</div>
        </div>
      </div>

      <a class="btn btn-outline-secondary" href="{{ url_for('dashboard') }}">Back to Dashboard</a>
    </div>
  </div>
</div>
</body>
</html>
